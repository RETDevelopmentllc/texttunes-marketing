    <path d="M-140,-120 C-140,-165 -105,-200 -60,-200 L60,-200 C105,-200 140,-165 140,-120 L140,-20 C140,25 105,60 60,60 L-20,60 L-70,120 L-50,60 L-60,60 C-105,60 -140,25 -140,-20 Z" fill="white"/>
    <!-- Music notes -->
    <g transform="translate(-10,-30)" fill="#7C3AED">
      <!-- First note -->
      <rect x="-40" y="-80" width="10" height="100" rx="3"/>
      <circle cx="-50" cy="20" r="22"/>
      <!-- Second note -->
      <rect x="30" y="-60" width="10" height="100" rx="3"/>
      <circle cx="20" cy="40" r="22"/>
      <!-- Beam connecting notes -->
